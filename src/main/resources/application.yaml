spring:
  application:
    name: pnc-parcial-final-hotel
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hotel_reservas}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: none
      show-sql: false
      properties:
        hibernate:
          format_sql: false
    flyway:
      enabled: true
      locations: classpath:db/migration

  jwt:
    secret: ${JWT_SECRET:CQZv6vcquP7LcJBEyOelw4zfSCdRYTRnRxOMlUrwRvD/Rr5dr5i/OoxFIlXl4I0m+WOywhA5pek7GBC897g8xg==}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}      # 15 minutos, en milisegundos
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 dias, en milisegundos

  server:
    port: ${PORT:8080}