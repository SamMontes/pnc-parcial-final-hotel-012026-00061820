services:
  db:
    image: postgres:17-alpine
    container_name: pnc-hotel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_reservas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5434:5432"
    volumes:
      - pnc_hotel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotel_reservas"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: pnc-hotel-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hotel_reservas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"

networks:
  default:
    name: pnc-hotel-network

volumes:
  pnc_hotel_pgdata: